name: Test Python Compatibility

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        exclude:
          # Optionally exclude specific combinations if needed
          - os: windows-latest
            python-version: "3.13"  # Remove if 3.13 works on Windows
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          uv sync --all-groups
      
      - name: Lint and Format Check
        run: |
          uv run ruff format src/new_tui_project_template --check
          uv run ruff check src/new_tui_project_template
      
      - name: Type Check
        run: |
          uv run pyright
      
      - name: Test CLI Help
        run: |
          uv run new_tui_project_template --help
      
      - name: Test Version
        run: |
          uv run new_tui_project_template --version